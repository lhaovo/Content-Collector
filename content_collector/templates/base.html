<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Content Collector' }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="min-h-screen flex">
    <aside class="w-64 border-r border-slate-800 p-6 bg-slate-900/70">
      <div class="text-xl font-semibold mb-8">Content Collector</div>
      <nav class="space-y-2 text-sm">
        <a class="block px-3 py-2 rounded hover:bg-slate-800" href="/">Dashboard</a>
        <a class="block px-3 py-2 rounded hover:bg-slate-800" href="/posts">Posts</a>
        <a class="block px-3 py-2 rounded hover:bg-slate-800" href="/jobs">Jobs</a>
        <a class="block px-3 py-2 rounded hover:bg-slate-800" href="/docs">API Docs</a>
      </nav>
    </aside>
    <main class="flex-1 p-8">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
